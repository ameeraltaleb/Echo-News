<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>ECHO NEWS - Global News, Breaking News & Latest Updates</title>
  <meta name="title" content="ECHO NEWS - Global News, Breaking News & Latest Updates" />
  <meta name="description" content="Delivering accurate, unbiased, and timely news from around the globe. Stay informed with breaking news, in-depth analysis, and diverse perspectives across politics, business, technology, science, health, and sports." />

  <!-- Bing Webmaster Tools -->

  <!-- Favicon -->

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#000000" />
  
  <!-- Preconnect to external domains for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="dns-prefetch" href="//api.echonews.com" />
  
  <!-- Structured Data (Organization) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "ECHO NEWS",
    "url": "https://echonews.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://echonews.com/logo.png",
      "width": "600",
      "height": "60"
    },
    "sameAs": [
      "https://twitter.com/echonews",
      "https://facebook.com/echonews",
      "https://instagram.com/echonews"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "email": "contact@echonews.com"
    }
  }
  </script>
  
  <!-- Sitelinks Search Box -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "https://echonews.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://echonews.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
